name: ML API CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          - python-version: "3.12"

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install requirements.txt

      - name: run tests
        run: |
          pytest
        
      
