services:
  mlflow:
    image: python:3.12-slim
    container_name: "mlflow-server"
    working_dir: /mlflow
    volumes:
      - ./mlflow_data:/mlflow
    ports:
      - 5000:5000
    command: >
      bash -c "pip install mlflow && mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/model_artifacts --host 0.0.0.0 --port 5000 --allowed-hosts '*'"
  
  app:
    build: .
    container_name: app
    working_dir: /app
    depends_on:
      - mlflow
    volumes:
      - ./mlflow_data:/mlflow
    ports:
      - 8000:8000
    environment:
      - MODEL_TRACKING_URI=http://mlflow:5000
      - ENVIRONMENT=Production

